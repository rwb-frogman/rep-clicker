<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>REP Smart Clicker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --red:    #E03030;
    --dark:   #0F0F0F;
    --card:   #1A1A1A;
    --border: #2A2A2A;
    --text:   #FFFFFF;
    --muted:  #666666;
    --green:  #4CAF50;
    --yellow: #FFC107;
  }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--red);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; letter-spacing: -0.5px;
  }

  .logo-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
    box-shadow: 0 0 0 3px rgba(128,128,128,0.15);
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 0 3px rgba(76,175,80,0.2); }
  .status-dot.scanning  { background: var(--yellow); box-shadow: 0 0 0 3px rgba(255,193,7,0.2); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── MAIN ── */
  .main { padding: 24px; display: flex; flex-direction: column; gap: 16px; }

  /* ── CONNECT BUTTON ── */
  .connect-btn {
    width: 100%;
    padding: 18px;
    border-radius: 14px;
    border: none;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.2px;
  }
  .connect-btn.idle       { background: var(--red); color: white; }
  .connect-btn.scanning   { background: var(--yellow); color: #000; }
  .connect-btn.connected  { background: var(--border); color: var(--muted); }
  .connect-btn:active     { transform: scale(0.98); opacity: 0.85; }

  /* ── DEVICE CARD ── */
  .device-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .device-name { font-size: 15px; font-weight: 600; }
  .device-id   { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .signal-bar  { font-size: 12px; color: var(--muted); }

  /* ── CLICK DISPLAY ── */
  .click-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .click-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--red);
    border-radius: 20px 20px 0 0;
  }

  .click-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .click-number {
    font-size: 96px;
    font-weight: 800;
    letter-spacing: -6px;
    line-height: 1;
    color: var(--text);
    transition: color 0.2s;
    font-variant-numeric: tabular-nums;
  }

  .click-number.changed { color: var(--red); }

  .click-unit {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  .click-direction {
    font-size: 13px;
    font-weight: 600;
    margin-top: 12px;
    height: 20px;
    transition: all 0.3s;
  }
  .click-direction.out  { color: var(--red); }
  .click-direction.in   { color: var(--yellow); }

  /* ── GAUGE ── */
  .gauge-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 24px;
  }

  .gauge-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .gauge-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }
  .gauge-value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }

  .gauge-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .gauge-fill {
    height: 100%;
    background: var(--red);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .gauge-range {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }

  .gauge-range span { font-size: 10px; color: var(--muted); }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }

  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .stat-unit  { font-size: 11px; color: var(--muted); }

  /* ── ZERO BUTTON ── */
  .zero-btn {
    width: 100%;
    padding: 18px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: -0.2px;
  }
  .zero-btn:active { background: var(--border); transform: scale(0.98); }
  .zero-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ── DISCONNECT ── */
  .disconnect-btn {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid rgba(224,48,48,0.3);
    background: rgba(224,48,48,0.08);
    color: var(--red);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .disconnect-btn:active { background: rgba(224,48,48,0.15); }

  /* ── LOG ── */
  .log-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px 20px;
  }

  .log-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 10px; }

  .log-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 140px;
    overflow-y: auto;
  }

  .log-item {
    font-size: 12px;
    font-family: 'SF Mono', monospace;
    color: var(--muted);
    padding: 3px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }

  .log-item:last-child { border-bottom: none; }
  .log-time { color: #444; min-width: 50px; }
  .log-msg.out  { color: var(--red); }
  .log-msg.in   { color: var(--yellow); }
  .log-msg.info { color: var(--green); }
  .log-msg.warn { color: var(--muted); }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    padding: 16px 24px 32px;
    font-size: 11px;
    color: #333;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-mark">R</div>
    <div>
      <div class="logo-text">REP Clicker</div>
      <div class="logo-sub">Suspension Sensor</div>
    </div>
  </div>
  <div class="status-dot" id="statusDot"></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CONNECT -->
  <button class="connect-btn idle" id="connectBtn" onclick="handleConnect()">
    Scan for REP Clicker
  </button>

  <!-- DEVICE INFO (hidden until connected) -->
  <div class="device-card hidden" id="deviceCard">
    <div>
      <div class="device-name" id="deviceName">—</div>
      <div class="device-id" id="deviceId">—</div>
    </div>
    <div class="signal-bar" id="signalBar">—</div>
  </div>

  <!-- CLICK COUNT -->
  <div class="click-card">
    <div class="click-label">Clicks Out</div>
    <div class="click-number" id="clickNumber">—</div>
    <div class="click-unit">from zero</div>
    <div class="click-direction" id="clickDirection"></div>
  </div>

  <!-- ANGLE GAUGE -->
  <div class="gauge-card">
    <div class="gauge-header">
      <span class="gauge-title">Rotation Angle</span>
      <span class="gauge-value"><span id="angleValue">—</span><span class="stat-unit"> °</span></span>
    </div>
    <div class="gauge-track">
      <div class="gauge-fill" id="gaugeFill"></div>
    </div>
    <div class="gauge-range"><span>0°</span><span>180°</span><span>360°</span></div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Battery</div>
      <div class="stat-value" id="battValue">—<span class="stat-unit">%</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Status</div>
      <div class="stat-value" id="statusValue" style="font-size:14px;padding-top:6px;">Disconnected</div>
    </div>
  </div>

  <!-- ZERO BUTTON -->
  <button class="zero-btn" id="zeroBtn" onclick="sendZero()" disabled>
    ⊘ &nbsp; Calibrate Zero
  </button>

  <!-- DISCONNECT -->
  <button class="disconnect-btn hidden" id="disconnectBtn" onclick="handleDisconnect()">
    Disconnect
  </button>

  <!-- LOG -->
  <div class="log-card">
    <div class="log-title">Event Log</div>
    <ul class="log-list" id="logList">
      <li class="log-item"><span class="log-time">--:--</span><span class="log-msg warn">Waiting for connection...</span></li>
    </ul>
  </div>

</div>

<div class="footer">REP Smart Clicker v1 · Bench Test</div>

<script>
// ════════════════════════════════════════
// BLE CONFIG — match your firmware UUIDs
// ════════════════════════════════════════
const SERVICE_UUID    = '19b10000-e8f2-537e-4f6c-d104768a1214';
const CLICK_UUID      = '19b10001-e8f2-537e-4f6c-d104768a1214';
const ANGLE_UUID      = '19b10002-e8f2-537e-4f6c-d104768a1214';
const BATTERY_UUID    = '2a19';
const ZERO_UUID       = '19b10004-e8f2-537e-4f6c-d104768a1214';

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════
let device        = null;
let server        = null;
let clickChar     = null;
let angleChar     = null;
let battChar      = null;
let zeroChar      = null;
let clickCount    = 0;
let lastClick     = 0;
let isConnected   = false;

// ════════════════════════════════════════
// UI ELEMENTS
// ════════════════════════════════════════
const connectBtn    = document.getElementById('connectBtn');
const disconnectBtn = document.getElementById('disconnectBtn');
const deviceCard    = document.getElementById('deviceCard');
const deviceName    = document.getElementById('deviceName');
const deviceId      = document.getElementById('deviceId');
const statusDot     = document.getElementById('statusDot');
const clickNumber   = document.getElementById('clickNumber');
const clickDir      = document.getElementById('clickDirection');
const angleValue    = document.getElementById('angleValue');
const gaugeFill     = document.getElementById('gaugeFill');
const battValue     = document.getElementById('battValue');
const statusValue   = document.getElementById('statusValue');
const zeroBtn       = document.getElementById('zeroBtn');
const logList       = document.getElementById('logList');

// ════════════════════════════════════════
// LOGGING
// ════════════════════════════════════════
function log(msg, type = 'info') {
  const now  = new Date();
  const time = now.toTimeString().slice(0,5);
  const li   = document.createElement('li');
  li.className = 'log-item';
  li.innerHTML = `<span class="log-time">${time}</span><span class="log-msg ${type}">${msg}</span>`;
  logList.insertBefore(li, logList.firstChild);
  if (logList.children.length > 20) logList.removeChild(logList.lastChild);
}

// ════════════════════════════════════════
// CONNECT
// ════════════════════════════════════════
async function handleConnect() {
  if (isConnected) return;

  try {
    setScanning();
    log('Scanning for REP-RFC-01...', 'warn');

    device = await navigator.bluetooth.requestDevice({
      filters: [{ name: 'REP-RFC-01' }],
      optionalServices: [SERVICE_UUID, 'device_information']
    });

    device.addEventListener('gattserverdisconnected', onDisconnected);
    log(`Found: ${device.name}`, 'info');

    server = await device.gatt.connect();
    log('GATT connected', 'info');

    const service = await server.getPrimaryService(SERVICE_UUID);

    // Click count
    clickChar = await service.getCharacteristic(CLICK_UUID);
    await clickChar.startNotifications();
    clickChar.addEventListener('characteristicvaluechanged', onClickChanged);

    // Angle
    try {
      angleChar = await service.getCharacteristic(ANGLE_UUID);
      await angleChar.startNotifications();
      angleChar.addEventListener('characteristicvaluechanged', onAngleChanged);
    } catch(e) { log('Angle char not found', 'warn'); }

    // Battery
    try {
      battChar = await service.getCharacteristic(BATTERY_UUID);
      await battChar.startNotifications();
      battChar.addEventListener('characteristicvaluechanged', onBattChanged);
      const battVal = await battChar.readValue();
      updateBattery(battVal.getUint8(0));
    } catch(e) { log('Battery char not found', 'warn'); }

    // Zero command
    try {
      zeroChar = await service.getCharacteristic(ZERO_UUID);
    } catch(e) { log('Zero char not found', 'warn'); }

    // Read initial click value
    try {
      const val = await clickChar.readValue();
      updateClicks(val.getInt32(0, true));
    } catch(e) {}

    setConnected();
    deviceName.textContent = device.name || 'REP Clicker';
    deviceId.textContent   = 'Right Fork Compression';
    log(`Connected to ${device.name}`, 'info');

  } catch(err) {
    setIdle();
    if (err.name !== 'NotFoundError') {
      log(`Error: ${err.message}`, 'warn');
    } else {
      log('Scan cancelled', 'warn');
    }
  }
}

// ════════════════════════════════════════
// DISCONNECT
// ════════════════════════════════════════
async function handleDisconnect() {
  if (device && device.gatt.connected) {
    await device.gatt.disconnect();
  }
}

function onDisconnected() {
  setIdle();
  log('Disconnected', 'warn');
}

// ════════════════════════════════════════
// ZERO
// ════════════════════════════════════════
async function sendZero() {
  if (!zeroChar) {
    // Fallback — just reset display
    updateClicks(0);
    log('Zeroed (local)', 'info');
    return;
  }
  try {
    const data = new Uint8Array([0x01]);
    await zeroChar.writeValue(data);
    updateClicks(0);
    log('Zeroed via BLE', 'info');
  } catch(err) {
    log(`Zero failed: ${err.message}`, 'warn');
  }
}

// ════════════════════════════════════════
// CHARACTERISTIC CALLBACKS
// ════════════════════════════════════════
function onClickChanged(event) {
  const val = event.target.value.getInt32(0, true);
  updateClicks(val);
}

function onAngleChanged(event) {
  const val = event.target.value.getInt32(0, true);
  updateAngle(val);
}

function onBattChanged(event) {
  const val = event.target.value.getUint8(0);
  updateBattery(val);
}

// ════════════════════════════════════════
// UI UPDATES
// ════════════════════════════════════════
function updateClicks(val) {
  const prev = clickCount;
  clickCount = val;
  clickNumber.textContent = val;

  // Flash red on change
  clickNumber.classList.add('changed');
  setTimeout(() => clickNumber.classList.remove('changed'), 400);

  // Direction indicator
  if (val > prev) {
    clickDir.textContent = '▲ Softer';
    clickDir.className   = 'click-direction out';
  } else if (val < prev) {
    clickDir.textContent = '▼ Firmer';
    clickDir.className   = 'click-direction in';
  }

  const direction = val > prev ? 'OUT' : val < prev ? 'IN' : null;
  if (direction) log(`${direction} — ${val} clicks`, direction.toLowerCase());
}

function updateAngle(val) {
  angleValue.textContent = val;
  const pct = (val / 360) * 100;
  gaugeFill.style.width = Math.min(pct, 100) + '%';
}

function updateBattery(val) {
  battValue.innerHTML = `${val}<span class="stat-unit">%</span>`;
}

// ════════════════════════════════════════
// UI STATE MACHINE
// ════════════════════════════════════════
function setIdle() {
  isConnected = false;
  connectBtn.textContent  = 'Scan for REP Clicker';
  connectBtn.className    = 'connect-btn idle';
  statusDot.className     = 'status-dot';
  statusValue.textContent = 'Disconnected';
  zeroBtn.disabled        = true;
  deviceCard.classList.add('hidden');
  disconnectBtn.classList.add('hidden');
  clickNumber.textContent = '—';
  clickDir.textContent    = '';
  angleValue.textContent  = '—';
  gaugeFill.style.width   = '0%';
  battValue.innerHTML     = '—';
}

function setScanning() {
  connectBtn.textContent = 'Scanning...';
  connectBtn.className   = 'connect-btn scanning';
  statusDot.className    = 'status-dot scanning';
  statusValue.textContent = 'Scanning';
}

function setConnected() {
  isConnected = true;
  connectBtn.textContent  = 'Connected';
  connectBtn.className    = 'connect-btn connected';
  statusDot.className     = 'status-dot connected';
  statusValue.textContent = 'Connected';
  zeroBtn.disabled        = false;
  deviceCard.classList.remove('hidden');
  disconnectBtn.classList.remove('hidden');
}
</script>
</body>
</html>
